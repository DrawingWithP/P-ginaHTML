<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de usuário</title>
</head>
<body>
    <form
        action="/cadastro"
        method="POST"
        >
    <fieldset>
        <legend>Nome</legend>
        <label for="name">Nome Completo</label>
        <input type="text" id="nome" name="nome" required>
    </fieldset>
    <fieldset>
        <legend>E-mail</legend>
    </fieldset>
    <fieldset>
        <legend>CPF</legend>
    </fieldset>
    <fieldset>
        <legend>Data de Nascimento</legend>
    </fieldset>
    <fieldset>
        <legend>Curso</legend>
    </fieldset>
    <fieldset>
        <legend>Turno</legend>
    </fieldset>

    </form>
</body>
</html>
